{% extends 'base.html' %}

{% block content %}
<style>
    .reset-container {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .reset-card {
        max-width: 380px;
        width: 100%;
        border: none;
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        background: #fff;
    }
    .brand-text { color: #211e48; font-weight: 800; letter-spacing: 1px; }
    .text-orange { color: #ffc107; }
    
    .btn-orange { 
        background-color: #ffc107; 
        border: none; 
        color: #211e48; 
        font-weight: 700;
        padding: 10px;
        transition: 0.3s;
    }
    .btn-orange:hover { background-color: #e5ac00; transform: translateY(-1px); }
    
    .form-label { font-size: 0.75rem; font-weight: 700; color: #211e48; text-transform: uppercase; }
    .input-group-text { background: none; border-right: none; color: #6c757d; }
    .form-control { border-left: none; font-size: 0.9rem; }
    .form-control:focus { border-color: #ffc107; box-shadow: none; }
</style>

<div class="reset-container">
    <div class="card reset-card p-4">
        
        <!-- Brand Header -->
        <div class="text-center mb-4">
            <h4 class="brand-text mb-1">GARAGE<span class="text-orange">SYS</span></h4>
            <p class="text-muted small">Secure Password Reset</p>
        </div>

        <!-- Error Message -->
        {% if error %}
        <div class="alert alert-danger py-2 small d-flex align-items-center gap-2">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <!-- Success Message -->
        {% if success %}
        <div class="alert alert-success py-2 small d-flex align-items-center gap-2 mb-4">
            <i class="bi bi-check-circle-fill"></i>
            <span>{{ success }}</span>
        </div>
        <div class="d-grid">
            <a href="{% url 'login' %}" class="btn btn-orange w-100">
                Go to Login
            </a>
        </div>

        {% else %}

        <form method="POST">
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group input-group-sm">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" 
                           placeholder="Enter username" value="{{ username|default:'' }}" required>
                </div>
            </div>

            <!-- New Password -->
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <div class="input-group input-group-sm">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" name="new_password" class="form-control" 
                           placeholder="New password" required>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <div class="input-group input-group-sm">
                    <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                    <input type="password" name="confirm_password" class="form-control" 
                           placeholder="Repeat password" required>
                </div>
            </div>

            <!-- Update Button -->
            <div class="d-grid">
                <button type="submit" class="btn btn-orange w-100 mb-2">
                    Update Password
                </button>
                <a href="{% url 'login' %}" class="btn btn-link btn-sm text-decoration-none text-muted">Cancel</a>
            </div>

        </form>
        {% endif %}

    </div>
</div>
{% endblock %}
