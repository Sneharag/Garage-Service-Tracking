{% extends 'base.html' %}
{% block content %}
<div class="container py-5 text-center">
    <div class="card shadow-lg p-5 mx-auto" style="max-width: 500px; border-radius: 20px; border: none;">
        <h4 class="fw-bold mb-1" style="color:#211e48;">Confirm Payment</h4>
        <p class="text-muted small mb-4">Invoice #{{ invoice.pk }}</p>
        
        <h1 class="display-5 fw-bold text-warning mb-4">₹{{ invoice.grand_total }}</h1>

        <!-- The "Pay Now" Button -->
        <button id="rzp-button1" class="btn btn-dark w-100 py-3 rounded-pill fw-bold">
            PROCEED TO SECURE PAY <i class="bi bi-shield-lock ms-2"></i>
        </button>
    </div>
</div>

<!-- Razorpay Checkout Script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    var options = {
        "key": "{{ razorpay_key }}", 
        "amount": "{{ amount }}", 
        "currency": "INR",
        "name": "GarageSys",
        "description": "Service Payment for {{ invoice.service_job.vehicle }}",
        "order_id": "{{ razorpay_order_id }}",
        
        // This function executes after payment success in the browser
        "handler": function (response){
            // We create a hidden form to send payment data to our Python view
            var form = document.createElement('form');
            form.method = 'POST';
            form.action = "{% url 'payment_handler' %}";
            
            var inputs = {
                'razorpay_payment_id': response.razorpay_payment_id,
                'razorpay_order_id': response.razorpay_order_id,
                'razorpay_signature': response.razorpay_signature
            };

            for (var key in inputs) {
                var input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = inputs[key];
                form.appendChild(input);
            }
            document.body.appendChild(form);
            form.submit();
        },
        "prefill": {
            "name": "{{ request.user.username }}",
            "email": "{{ request.user.email }}"
        },
        "theme": { "color": "#211e48" }
    };
    
    var rzp1 = new Razorpay(options);
    document.getElementById('rzp-button1').onclick = function(e){
        rzp1.open();
        e.preventDefault();
    }
</script>
{% endblock %}
