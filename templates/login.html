<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GarageSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; }
        .login-card { 
            max-width: 380px; 
            margin: auto; 
            border: none; 
            border-radius: 1rem; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .brand-text { color: #211e48; font-weight: 800; letter-spacing: 1px; }
        .text-orange { color: #ffc107; }
        .btn-primary { 
            background-color: #ffc107; 
            border: none; 
            color: #211e48; 
            font-weight: 700;
        }
        .btn-primary:hover { background-color: #e5ac00; color: #211e48; }
        .form-control:focus { border-color: #ffc107; box-shadow: none; }
        .input-group-text { background: none; border-right: none; color: #6c757d; }
        .form-control { border-left: none; }

        #toggle-password {
    background-color: transparent;
    border-left: none;
    color: #6c757d;
}

#password-field {
    border-right: none;
}

/* Ensure eye icon stays orange on focus if you like */
.input-group:focus-within #toggle-password {
    border-color: #ffc107;
    color: #ffc107;
}
    </style>
</head>
<body>

<div class="container">
    <div class="card login-card p-4">
        <div class="text-center mb-4">
            <h4 class="brand-text mb-1">GARAGE<span class="text-orange">SYS</span></h4>
            <p class="text-muted small">Sign in to your account</p>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2 small text-center">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-bold">Username</label>
                <div class="input-group input-group-sm">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                </div>
            </div>

            <!-- <div class="mb-2">
                <label class="form-label small fw-bold">Password</label>
                <div class="input-group input-group-sm">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
            </div> -->

            <div class="mb-2">
    <label class="form-label small fw-bold">Password</label>
    <div class="input-group input-group-sm">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="password" id="password-field" class="form-control" placeholder="Password" required>
        
        <!-- Fix: The container span should not have any bi- classes -->
        <span class="input-group-text" id="toggle-password" style="cursor: pointer; background: none;">
            <i class="bi bi-eye" id="eye-icon"></i>
        </span>
    </div>
</div>

            <div class="text-end mb-4">
                <a href="{% url 'forgot_password' %}" class="text-decoration-none small text-muted">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Login</button>
            
            <p class="text-center small mb-0">
                New here? <a href="{% url 'signup' %}" class="text-decoration-none fw-bold text-orange">Sign Up</a>
            </p>
        </form>
    </div>
</div>
<script>
    const togglePassword = document.querySelector('#toggle-password');
    const passwordField = document.querySelector('#password-field');
    const eyeIcon = document.querySelector('#eye-icon');

    togglePassword.addEventListener('click', function () {
        // 1. Toggle the input type
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        
        // 2. Toggle the icon classes ONLY on the eyeIcon element
        eyeIcon.classList.toggle('bi-eye');
        eyeIcon.classList.toggle('bi-eye-slash');
    });
</script>
</body>
</html>
