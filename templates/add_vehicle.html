{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    :root {
        --brand-blue: #211e48;
        --brand-orange: #ffc107;
        --soft-bg: #f8f9fa;
    }

    .dashboard-wrapper { padding: 1.5rem 0; }
    
    /* Header Styling */
    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
    }

    .page-title {
        font-weight: 800;
        color: var(--brand-blue);
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0;
    }

    /* Professional Form Card */
    .form-card {
        background: white;
        border: none;
        border-radius: 1rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        max-width: 600px;
        margin: 0 auto; /* Centering the form */
        overflow: hidden;
    }

    .form-header {
        background-color: var(--soft-bg);
        border-bottom: 1px solid #eee;
        padding: 1.25rem;
        font-weight: 800;
        color: var(--brand-blue);
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
        text-align: center;
    }

    .form-body {
        padding: 2rem;
    }

    /* Styling Django's form.as_p fields via CSS */
    .form-body p {
        margin-bottom: 1.25rem;
    }

    .form-body label {
        display: block;
        font-weight: 700;
        font-size: 0.75rem;
        text-transform: uppercase;
        color: #6c757d;
        margin-bottom: 0.5rem;
        letter-spacing: 0.5px;
    }

    .form-body input, 
    .form-body select, 
    .form-body textarea {
        width: 100%;
        padding: 0.75rem 1rem;
        font-size: 0.9rem;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        color: #4a5568;
        transition: all 0.2s;
    }

    .form-body input:focus, 
    .form-body select:focus {
        outline: none;
        border-color: var(--brand-orange);
        box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.15);
    }

    /* Buttons */
    .btn-save {
        background: var(--brand-blue);
        color: white;
        font-weight: 700;
        font-size: 0.85rem;
        text-transform: uppercase;
        padding: 0.8rem 2rem;
        border-radius: 50px;
        border: none;
        width: 100%;
        transition: 0.3s;
        margin-top: 1rem;
    }

    .btn-save:hover {
        background: var(--brand-orange);
        color: var(--brand-blue);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .btn-back {
        font-size: 0.75rem;
        color: #6c757d;
        text-decoration: none;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        transition: 0.2s;
    }
    .btn-back:hover { color: var(--brand-blue); }

</style>

<div class="dashboard-wrapper container">

    <!-- PAGE HEADER -->
    <div class="page-header">
        <h1 class="page-title">
            <i class="bi bi-car-front"></i> Vehicle Registration
        </h1>
        <a href="{% url 'vehicle_list' %}" class="btn-back">
            <i class="bi bi-arrow-left"></i> Back to List
        </a>
    </div>

    <!-- FORM CARD -->
    <div class="form-card animate__animated animate__fadeInUp">
        <div class="form-header">
            Enter Vehicle Information
        </div>
        
        <div class="form-body">
            <form method="POST">
                {% csrf_token %}

                <!-- We target the 'p' tags inside .form-body using CSS above -->
                {{ form.as_p }}

                <button type="submit" class="btn-save shadow-sm">
                    <i class="bi bi-check-circle me-2"></i> Register Vehicle
                </button>
            </form>
        </div>
    </div>

</div>

<!-- Adding small script to inject Bootstrap classes into Django auto-generated fields -->
<script>
    document.querySelectorAll('.form-body input, .form-body select, .form-body textarea').forEach(el => {
        el.classList.add('form-control');
    });
</script>

{% endblock %}
