{% extends 'base.html' %}

{% block content %}
<style>
    :root {
        --brand-blue: #211e48;
        --brand-orange: #ffc107;
        --soft-bg: #f8f9fa;
    }

    .profile-container {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .profile-card {
        max-width: 400px;
        width: 100%;
        border: none;
        border-radius: 1.5rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        background: white;
        overflow: hidden;
    }

    /* Avatar Circle */
    .avatar-circle {
        width: 80px;
        height: 80px;
        background: var(--brand-blue);
        color: white;
        font-size: 2rem;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        margin: 0 auto 1.5rem;
        border: 4px solid var(--brand-orange);
    }

    .profile-label {
        font-size: 0.7rem;
        font-weight: 800;
        color: #a0aec0;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 2px;
    }

    .profile-value {
        font-weight: 700;
        color: var(--brand-blue);
        margin-bottom: 1.2rem;
    }

    /* Soft Badge for Role */
    .role-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 50px;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        background: rgba(33, 30, 72, 0.1);
        color: var(--brand-blue);
    }

    .btn-edit-profile {
        background: var(--brand-orange);
        color: var(--brand-blue);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 10px 20px;
        border-radius: 50px;
        border: none;
        width: 100%;
        transition: 0.3s;
        text-decoration: none;
        display: block;
    }

    .btn-edit-profile:hover {
        background: var(--brand-blue);
        color: white;
        transform: translateY(-2px);
    }
</style>

<div class="profile-container">
    <div class="card profile-card p-4 p-md-5">
        <div class="text-center">
            
            <!-- Professional Initials Avatar -->
            <div class="avatar-circle">
                {{ user.username|first|upper }}
            </div>

            <h3 class="fw-bold mb-1" style="color: var(--brand-blue);">{{ user.username }}</h3>
            <div class="mb-4">
                <span class="role-badge">
                    <i class="bi bi-shield-lock me-1"></i> {{ user.role }}
                </span>
            </div>

            <hr class="opacity-10 mb-4">

            <!-- User Details -->
            <div class="text-start ps-3">
                <div class="profile-label">Email Address</div>
                <div class="profile-value">{{ user.email }}</div>

                <div class="profile-label">Account Status</div>
                <div class="profile-value text-success">
                    <i class="bi bi-check-circle-fill me-1"></i> Verified Active
                </div>
            </div>

            <div class="mt-4">
                <a href="#" class="btn btn-edit-profile shadow-sm">
                    <i class="bi bi-pencil-square me-2"></i> Edit Profile
                </a>
            </div>

            <p class="text-muted small mt-4 mb-0">Member since 2025</p>

        </div>
    </div>
</div>

{% endblock %}
