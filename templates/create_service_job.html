{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    :root {
        --brand-blue: #211e48;
        --brand-orange: #ffc107;
        --soft-bg: #f8f9fa;
    }

    .dashboard-wrapper { padding: 1.5rem 0; }
    
    /* Header Styling */
    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
    }

    .page-title {
        font-weight: 800;
        color: var(--brand-blue);
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0;
    }

    /* Professional Form Card */
    .form-card {
        background: white;
        border: none;
        border-radius: 1rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        max-width: 650px; /* Slightly wider to accommodate problem descriptions */
        margin: 0 auto;
        overflow: hidden;
    }

    .form-header {
        background-color: var(--soft-bg);
        border-bottom: 1px solid #eee;
        padding: 1.25rem;
        font-weight: 800;
        color: var(--brand-blue);
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
        text-align: center;
    }

    .form-body {
        padding: 2.5rem 2rem;
    }

    /* Target Django's auto-generated tags */
    .form-body p {
        margin-bottom: 1.5rem;
    }

    .form-body label {
        display: block;
        font-weight: 700;
        font-size: 0.7rem;
        text-transform: uppercase;
        color: #6c757d;
        margin-bottom: 0.6rem;
        letter-spacing: 0.8px;
    }

    .form-body input, 
    .form-body select, 
    .form-body textarea {
        width: 100%;
        padding: 0.75rem 1rem;
        font-size: 0.9rem;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        color: #4a5568;
        background-color: #fff;
        transition: all 0.2s;
    }

    .form-body textarea {
        min-height: 120px;
        resize: vertical;
    }

    .form-body input:focus, 
    .form-body select:focus, 
    .form-body textarea:focus {
        outline: none;
        border-color: var(--brand-orange);
        box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.15);
    }

    /* Save Button */
    .btn-save {
        background: var(--brand-blue);
        color: white;
        font-weight: 700;
        font-size: 0.85rem;
        text-transform: uppercase;
        padding: 0.9rem 2rem;
        border-radius: 50px;
        border: none;
        width: 100%;
        transition: 0.3s;
        margin-top: 0.5rem;
    }

    .btn-save:hover {
        background: var(--brand-orange);
        color: var(--brand-blue);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .btn-back {
        font-size: 0.75rem;
        color: #6c757d;
        text-decoration: none;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }
    .btn-back:hover { color: var(--brand-blue); }
</style>

<div class="dashboard-wrapper container">

    <!-- PAGE HEADER -->
    <div class="page-header">
        <h1 class="page-title">
            <i class="bi bi-tools"></i> Service Initiation
        </h1>
        <a href="{% url 'service_job_list' %}" class="btn-back">
            <i class="bi bi-arrow-left"></i> Back to Service Log
        </a>
    </div>
    <!-- SHOW ERRORS IF ANY -->
        {% if form.errors %}
            <div class="alert alert-danger small">
                {{ form.errors }}
            </div>
        {% endif %}

    <!-- FORM CARD -->
    <div class="form-card animate__animated animate__fadeInUp">
        <div class="form-header">
            Create New Service Ticket
        </div>
        
        <div class="form-body">
            <form method="POST">
                {% csrf_token %}

                <!-- Customer Select -->
            <div class="mb-3">
                <label class="form-label fw-bold small">SELECT CUSTOMER</label>
                <select name="customer_select" id="id_customer" class="form-select" required>
                    <option value="">-- Choose Customer --</option>
                    {% for user in customers %}
                        <option value="{{ user.id }}">{{ user.username }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- 2. Vehicle Select (Linked to AJAX) -->
            <div class="mb-3">
                <label class="form-label fw-bold small">SELECT VEHICLE</label>
                <select name="vehicle" id="id_vehicle" class="form-select" required disabled>
                    <option value="">-- Select Customer First --</option>
                </select>
            </div>

            <!-- 3. Form Fields (Mechanic & Problem Description) -->
            <div class="mb-3">
                <label class="form-label fw-bold small">ASSIGN MECHANIC</label>
                {{ form.mechanic }}
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small">PROBLEM DESCRIPTION</label>
                {{ form.problem_description }}
            </div>

                <button type="submit" class="btn-save shadow-sm mt-3">
                    <i class="bi bi-plus-circle me-2"></i> Create Service Job
                </button>
            </form>
        </div>
    </div>

</div>

<!-- Helper script to ensure all fields have proper styling -->
<script>
    document.querySelectorAll('.form-body input, .form-body select, .form-body textarea').forEach(el => {
        el.classList.add('form-control');
    });
</script>

<!-- AJAX SCRIPT -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $("#id_customer").change(function () {
        const customerId = $(this).val();
        const vehicleSelect = $("#id_vehicle");

        if (customerId) {
            $.ajax({
                url: "{% url 'get_customer_vehicles' %}",
                data: { 'customer_id': customerId },
                success: function (data) {
                    vehicleSelect.html('<option value="">-- Select Vehicle --</option>');
                    data.forEach(function (v) {
                        vehicleSelect.append(`<option value="${v.id}">${v.vehicle_number} (${v.model})</option>`);
                    });
                    vehicleSelect.prop('disabled', false);
                }
            });
        } else {
            vehicleSelect.html('<option value="">-- Select Customer First --</option>').prop('disabled', true);
        }
    });
</script>

{% endblock %}
